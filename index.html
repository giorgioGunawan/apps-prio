<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priority List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      color: #1d1d1f;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    .add-form {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 24px;
    }

    /* font-size 16px prevents iOS Safari zoom on focus */
    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d1d6;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .add-form input:focus { border-color: #0071e3; }

    .add-form button {
      padding: 10px 18px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      -webkit-appearance: none;
    }

    .add-form button:hover  { background: #0077ed; }
    .add-form button:active { background: #006edb; }

    #list {
      width: 100%;
      max-width: 520px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1.5px solid #e5e5ea;
      border-radius: 12px;
      padding: 12px 14px;
      user-select: none;
      -webkit-user-select: none;
      transition: box-shadow 0.15s, opacity 0.15s, border-color 0.15s;
      /* NO touch-action:none here — allows page scrolling on card body */
    }

    .item.dragging  { opacity: 0.45; border-color: #0071e3; }
    .item.drag-over { box-shadow: 0 0 0 2.5px #0071e3; }

    .handle {
      color: #aeaeb2;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      cursor: grab;
      padding: 4px 3px;
      touch-action: none; /* disable scroll only on the drag handle */
    }
    .handle:active { cursor: grabbing; }

    .item-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Date badge ───────────────────────────────────────────────────────── */
    .date-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .date-btn {
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      line-height: 1;
      /* fixed height so empty/filled never differ */
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 7px;
      transition: background 0.15s, color 0.15s;
      -webkit-appearance: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* no date — just a faint + */
    .date-btn.empty {
      background: none;
      color: #d1d1d6;
      padding: 0 5px;
    }
    .date-btn.empty:hover  { background: #f2f2f7; color: #aeaeb2; }
    .date-btn.empty:active { background: #e5e5ea; }

    /* date is set — small soft pill */
    .date-btn.filled {
      background: rgba(0,0,0,0.055);
      color: #48484a;
      font-weight: 500;
    }
    .date-btn.filled:hover  { background: rgba(0,0,0,0.09); }
    .date-btn.filled:active { background: rgba(0,0,0,0.12); }

    .date-picker {
      position: absolute;
      right: 0;
      top: 30px;
      background: #fff;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 156px;
    }

    .date-picker-row {
      display: flex;
      gap: 6px;
    }

    .date-picker select {
      flex: 1;
      padding: 5px 2px;
      border: 1.5px solid #d1d1d6;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      background: #f9f9fb;
      cursor: pointer;
      text-align: center;
      outline: none;
    }
    .date-picker select:focus { border-color: #0071e3; }

    .date-picker-clear {
      background: none;
      border: none;
      color: #aeaeb2;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 0;
      text-align: center;
      -webkit-appearance: none;
      transition: color 0.15s;
    }
    .date-picker-clear:hover { color: #ff3b30; }

    /* ── Color picker ─────────────────────────────────────────────────────── */
    .color-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.15);
      cursor: pointer;
      padding: 0;
      display: block;
      -webkit-appearance: none;
      transition: transform 0.1s;
    }
    .color-btn:active { transform: scale(0.9); }

    .color-picker {
      position: absolute;
      right: 0;
      top: 28px;
      background: #fff;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: 148px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      z-index: 1000;
    }

    .color-swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.1);
      cursor: pointer;
      -webkit-appearance: none;
      transition: transform 0.1s;
    }
    .color-swatch:hover    { transform: scale(1.18); }
    .color-swatch.selected { border: 2.5px solid #0071e3; }

    /* ── Delete button ────────────────────────────────────────────────────── */
    .delete-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #aeaeb2;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    .delete-btn:hover  { color: #ff3b30; background: #fff2f2; }
    .delete-btn:active { color: #ff3b30; }

    .empty {
      text-align: center;
      color: #aeaeb2;
      font-size: 15px;
      padding: 40px 0;
    }
  </style>
</head>
<body>

<h1>Priority List</h1>

<div class="add-form">
  <input type="text" id="new-item" placeholder="Add something…" autocomplete="off">
  <button onclick="addItem()">Add</button>
</div>

<ul id="list"></ul>

<script>
  var STORAGE_KEY = 'prio_list_v2';

  var COLORS = [
    '#ffffff', '#fff9c4', '#e8f5e9', '#e3f2fd',
    '#fce4ec', '#f3e5f5', '#fff3e0', '#ffebee'
  ];

  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // ── Storage ────────────────────────────────────────────────────────────────
  function loadItems() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
      }
      // Migrate from v1 (plain strings)
      var v1 = localStorage.getItem('prio_list_v1');
      if (v1) {
        var v1p = JSON.parse(v1);
        if (Array.isArray(v1p)) {
          return v1p.map(function(x) {
            return typeof x === 'string'
              ? { id: uid(), text: x, color: '#ffffff' }
              : x;
          });
        }
      }
    } catch (e) {}
    return [];
  }

  function saveItems() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (e) {}
  }

  function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  // ── State ──────────────────────────────────────────────────────────────────
  var items = loadItems();
  var openPickerId     = null;
  var openDatePickerId = null;

  // ── Drag state ─────────────────────────────────────────────────────────────
  var dragSrcIdx    = null;
  var touchGhost    = null;
  var touchDragLi   = null;
  var touchOffsetX  = 0;
  var touchOffsetY  = 0;

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    var list = document.getElementById('list');
    list.innerHTML = '';

    if (items.length === 0) {
      var empty = document.createElement('li');
      empty.className = 'empty';
      empty.textContent = 'No items yet. Add something above.';
      list.appendChild(empty);
      return;
    }

    items.forEach(function(item, idx) {
      var li = document.createElement('li');
      li.className = 'item';
      li.draggable = true;
      li.dataset.idx = idx;
      li.dataset.id  = item.id;
      li.style.background = item.color || '#ffffff';

      // Handle — touch drag attaches here only
      var handle = document.createElement('span');
      handle.className = 'handle';
      handle.setAttribute('aria-hidden', 'true');
      handle.innerHTML = '&#9776;';
      handle.addEventListener('touchstart', onTouchStart, { passive: false });

      // Text
      var text = document.createElement('span');
      text.className = 'item-text';
      text.textContent = item.text;

      // Date badge
      var dateWrap = document.createElement('div');
      dateWrap.className = 'date-wrap';

      var dateBtn = document.createElement('button');
      var mo = item.month;
      if (mo) {
        dateBtn.className = 'date-btn filled';
        dateBtn.textContent = MONTHS[mo.m - 1] + " '" + String(mo.y).slice(-2);
      } else {
        dateBtn.className = 'date-btn empty';
        dateBtn.textContent = '+';
      }
      dateBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleDatePicker(item.id, dateWrap, item.month);
      });
      dateWrap.appendChild(dateBtn);

      // Color dot
      var wrap = document.createElement('div');
      wrap.className = 'color-wrap';

      var colorBtn = document.createElement('button');
      colorBtn.className = 'color-btn';
      colorBtn.style.background = item.color || '#ffffff';
      colorBtn.title = 'Color';
      colorBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        togglePicker(item.id, wrap, item.color || '#ffffff');
      });
      wrap.appendChild(colorBtn);

      // Delete
      var del = document.createElement('button');
      del.className = 'delete-btn';
      del.title = 'Delete';
      del.innerHTML = '&#x2715;';
      del.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteItem(item.id);
      });

      li.appendChild(handle);
      li.appendChild(text);
      li.appendChild(dateWrap);
      li.appendChild(wrap);
      li.appendChild(del);

      // Desktop drag events on the full item
      li.addEventListener('dragstart', onDragStart);
      li.addEventListener('dragover',  onDragOver);
      li.addEventListener('drop',      onDrop);
      li.addEventListener('dragend',   onDragEnd);

      list.appendChild(li);
    });
  }

  // ── Date picker ────────────────────────────────────────────────────────────
  function toggleDatePicker(id, dateWrap, current) {
    closePickers();
    if (openDatePickerId === id) return; // was already open, closePickers shut it

    openDatePickerId = id;
    var now = new Date();
    var selM = current ? current.m : now.getMonth() + 1;
    var selY = current ? current.y : now.getFullYear();

    var picker = document.createElement('div');
    picker.className = 'date-picker';

    // Month + Year row
    var row = document.createElement('div');
    row.className = 'date-picker-row';

    var mSel = document.createElement('select');
    for (var i = 1; i <= 12; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = MONTHS[i - 1];
      if (i === selM) opt.selected = true;
      mSel.appendChild(opt);
    }

    var ySel = document.createElement('select');
    var startY = now.getFullYear() - 1;
    for (var y = startY; y <= startY + 6; y++) {
      var yOpt = document.createElement('option');
      yOpt.value = y;
      yOpt.textContent = "'" + String(y).slice(-2);
      if (y === selY) yOpt.selected = true;
      ySel.appendChild(yOpt);
    }

    function applyDate() {
      var item = items.filter(function(i) { return i.id === id; })[0];
      if (!item) return;
      item.month = { m: parseInt(mSel.value, 10), y: parseInt(ySel.value, 10) };
      saveItems();
      render();
    }

    mSel.addEventListener('change', function(e) { e.stopPropagation(); applyDate(); });
    ySel.addEventListener('change', function(e) { e.stopPropagation(); applyDate(); });
    mSel.addEventListener('click',  function(e) { e.stopPropagation(); });
    ySel.addEventListener('click',  function(e) { e.stopPropagation(); });

    row.appendChild(mSel);
    row.appendChild(ySel);
    picker.appendChild(row);

    if (current) {
      var clearBtn = document.createElement('button');
      clearBtn.className = 'date-picker-clear';
      clearBtn.textContent = 'Remove date';
      clearBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var item = items.filter(function(i) { return i.id === id; })[0];
        if (item) { item.month = null; saveItems(); }
        picker.remove();
        openDatePickerId = null;
        render();
      });
      picker.appendChild(clearBtn);
    }

    dateWrap.appendChild(picker);
  }

  function closePickers() {
    var cp = document.querySelector('.color-picker');
    if (cp) cp.remove();
    var dp = document.querySelector('.date-picker');
    if (dp) dp.remove();
    // Only null openDatePickerId if it was genuinely open (toggle logic handles this)
    var wasDate  = openDatePickerId;
    var wasColor = openPickerId;
    openPickerId     = null;
    openDatePickerId = null;
    return { color: wasColor, date: wasDate };
  }

  // ── Color picker ───────────────────────────────────────────────────────────
  function togglePicker(id, wrap, current) {
    var prev = closePickers();
    if (prev.color === id) return; // was already open, now closed

    openPickerId = id;
    var picker = document.createElement('div');
    picker.className = 'color-picker';

    COLORS.forEach(function(color) {
      var sw = document.createElement('button');
      sw.className = 'color-swatch' + (color === current ? ' selected' : '');
      sw.style.background = color;
      sw.addEventListener('click', function(e) {
        e.stopPropagation();
        setColor(id, color);
        closePickers();
      });
      picker.appendChild(sw);
    });

    wrap.appendChild(picker);
  }

  document.addEventListener('click', function() { closePickers(); });

  function setColor(id, color) {
    var item = items.filter(function(i) { return i.id === id; })[0];
    if (!item) return;
    item.color = color;
    saveItems();
    render();
  }

  // ── Add / Delete ───────────────────────────────────────────────────────────
  function addItem() {
    var input = document.getElementById('new-item');
    var text  = input.value.trim();
    if (!text) return;
    items.push({ id: uid(), text: text, color: '#ffffff', month: null });
    saveItems();
    render();
    input.value = '';
    // Don't re-focus on mobile — avoids keyboard re-popping
    if (window.innerWidth > 600) input.focus();
  }

  function deleteItem(id) {
    items = items.filter(function(i) { return i.id !== id; });
    saveItems();
    render();
  }

  document.getElementById('new-item').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addItem();
  });

  // ── Desktop drag & drop ────────────────────────────────────────────────────
  function onDragStart(e) {
    dragSrcIdx = parseInt(this.dataset.idx, 10);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(dragSrcIdx));
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.item').forEach(function(el) {
      el.classList.remove('drag-over');
    });
    this.classList.add('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    var targetIdx = parseInt(this.dataset.idx, 10);
    if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
    var moved = items.splice(dragSrcIdx, 1)[0];
    items.splice(targetIdx, 0, moved);
    saveItems();
    render();
  }

  function onDragEnd() {
    dragSrcIdx = null;
    document.querySelectorAll('.item').forEach(function(el) {
      el.classList.remove('dragging', 'drag-over');
    });
  }

  // ── Touch drag (handle only → document move/end) ───────────────────────────
  function onTouchStart(e) {
    if (e.touches.length !== 1) return;
    e.preventDefault(); // prevent scroll only when touching the handle
    var touch = e.touches[0];
    var li    = this.closest('.item');

    dragSrcIdx   = parseInt(li.dataset.idx, 10);
    touchDragLi  = li;

    var rect     = li.getBoundingClientRect();
    touchOffsetX = touch.clientX - rect.left;
    touchOffsetY = touch.clientY - rect.top;

    var ghost = li.cloneNode(true);
    ghost.style.cssText =
      'position:fixed;left:' + rect.left + 'px;top:' + rect.top + 'px;' +
      'width:' + rect.width + 'px;margin:0;' +
      'opacity:0.85;z-index:9999;pointer-events:none;' +
      'box-shadow:0 8px 28px rgba(0,0,0,0.18);border-color:#0071e3;';
    document.body.appendChild(ghost);
    touchGhost = ghost;

    li.classList.add('dragging');

    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend',  onTouchEnd,  { passive: false });
  }

  function onTouchMove(e) {
    if (!touchGhost) return;
    e.preventDefault();
    var touch = e.touches[0];
    touchGhost.style.top  = (touch.clientY - touchOffsetY) + 'px';
    touchGhost.style.left = (touch.clientX - touchOffsetX) + 'px';

    // Highlight the item underneath
    touchGhost.style.display = 'none';
    var below = document.elementFromPoint(touch.clientX, touch.clientY);
    touchGhost.style.display = '';

    document.querySelectorAll('.item').forEach(function(el) {
      el.classList.remove('drag-over');
    });
    var hovered = below && below.closest('.item');
    if (hovered && hovered !== touchDragLi) hovered.classList.add('drag-over');
  }

  function onTouchEnd(e) {
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend',  onTouchEnd);

    if (!touchGhost) return;
    var touch = e.changedTouches[0];

    touchGhost.style.display = 'none';
    var below = document.elementFromPoint(touch.clientX, touch.clientY);
    touchGhost.remove();
    touchGhost = null;

    var hovered = below && below.closest('.item');
    if (hovered && dragSrcIdx !== null) {
      var targetIdx = parseInt(hovered.dataset.idx, 10);
      if (dragSrcIdx !== targetIdx) {
        var moved = items.splice(dragSrcIdx, 1)[0];
        items.splice(targetIdx, 0, moved);
        saveItems();
      }
    }

    dragSrcIdx  = null;
    touchDragLi = null;
    render();
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
